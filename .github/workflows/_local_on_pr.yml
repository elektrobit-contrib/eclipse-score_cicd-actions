name: PR
on:
  pull_request:
    types: [opened, reopened, synchronize]
  merge_group:
    types: [checks_requested]

jobs:
  common:
    uses: eclipse-score/cicd-workflows/.github/workflows/on-pr.yml@v0.0.1
    permissions:
      id-token: write
      contents: read

  inter-repo-access-tests:
    uses: ./.github/workflows/test-inter-repo-access.yml
    permissions:
      contents: read

  setup-qnx-sdp-tests:
    uses: ./.github/workflows/test-setup-qnx-sdp.yml
    permissions:
      contents: read

  unblock-user-namespace-for-linux-sandbox-tests:
    uses: ./.github/workflows/test-unblock-user-namespace-for-linux-sandbox.yml
    permissions:
      contents: read
